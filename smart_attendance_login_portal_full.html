
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#4F46E5;--acl:#EEF2FF;--acd:#3730A3;
  --gc:#3B6D11;--gl:#EAF3DE;
  --am:#854F0B;--aml:#FAEEDA;
  --rd:#A32D2D;--rdl:#FCEBEB;
  --sw:186px;--hh:48px
}
body{font-family:inherit;background:var(--color-background-tertiary);color:var(--color-text-primary)}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:700px}
.topbar{height:var(--hh);background:var(--color-background-primary);border-bottom:.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.logo{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.body{display:flex;flex:1;overflow:hidden;min-height:652px}
.sb{width:var(--sw);background:var(--color-background-primary);border-right:.5px solid var(--color-border-tertiary);padding:8px 6px;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}

/* ── NAV ── */
.ns{font-size:9px;font-weight:500;color:var(--color-text-tertiary);padding:9px 8px 2px;letter-spacing:.06em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--border-radius-md);font-size:11px;color:var(--color-text-secondary);cursor:pointer;user-select:none;transition:all .12s}
.ni:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.ni.on{font-weight:500}
.ni.ona{background:var(--acl);color:var(--ac)}
.ni.ons{background:var(--gl);color:var(--gc)}
.ni i{font-size:14px}
.nbg{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:7px;font-weight:500}
.nbg.r{background:var(--rdl);color:var(--rd)}
.nbg.g{background:var(--gl);color:var(--gc)}
.nbg.a{background:var(--aml);color:var(--am)}

/* ── CARDS ── */
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
.ch{padding:9px 13px;border-bottom:.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct{font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px}
.cb{padding:12px 13px}
.row{display:flex;gap:10px}
.col1{flex:1;display:flex;flex-direction:column;gap:10px}

/* ── METRICS ── */
.mg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.mg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.ml{font-size:9px;color:var(--color-text-secondary);margin-bottom:2px}
.mv{font-size:20px;font-weight:500}
.ms{font-size:9px;color:var(--color-text-secondary);margin-top:1px}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 7px;border-radius:9px;font-weight:500;white-space:nowrap}
.pp{background:var(--gl);color:#27500A}
.pl{background:var(--aml);color:#633806}
.pa{background:var(--rdl);color:#791F1F}
.pu{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.pi{background:var(--acl);color:var(--acd)}
.ph{background:#FEF9EE;color:#633806}
.plive{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 9px;border-radius:10px;border:.5px solid var(--color-border-success);background:var(--color-background-success);color:var(--color-text-success)}
.phol{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 9px;border-radius:10px;border:.5px solid #FAC775;background:#FEF9EE;color:#633806}
.pulse{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BUTTONS ── */
.btn{padding:4px 11px;border-radius:var(--border-radius-md);font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);transition:all .12s}
.btn:hover{background:var(--color-background-secondary)}
.btn.pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.pri:hover{background:var(--acd)}
.btn.grn{background:var(--gc);color:#fff;border-color:var(--gc)}
.btn.dng{background:var(--rdl);color:var(--rd);border-color:#F7C1C1}
.btn.warn{background:var(--aml);color:var(--am);border-color:#FAC775}
.btn.sm{padding:3px 8px;font-size:10px}
.btn.lg{padding:8px 20px;font-size:13px;width:100%;justify-content:center}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.fg label{font-size:10px;color:var(--color-text-secondary)}
.fg input,.fg select{font-size:12px}
.inp-lg{font-size:14px;padding:10px 12px;width:100%}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.tbl th{text-align:left;padding:6px 10px;font-size:9px;font-weight:500;color:var(--color-text-secondary);border-bottom:.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.tbl td{padding:6px 10px;border-bottom:.5px solid var(--color-border-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--color-background-secondary)}

/* ── MISC ── */
.bw{display:flex;flex-direction:column;gap:6px}
.br{display:flex;align-items:center;gap:6px}
.bl2{width:80px;font-size:9px;color:var(--color-text-secondary);text-align:right;flex-shrink:0}
.bt{flex:1;height:12px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;font-size:8px;color:#fff;font-weight:500;padding-left:4px;display:flex;align-items:center}
.bp{width:22px;text-align:right;font-size:9px;color:var(--color-text-secondary)}
.dbar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-top:3px}
.dbf{height:100%;border-radius:2px}
.di{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:.5px solid var(--color-border-tertiary)}
.di:last-child{border-bottom:none}
.dav{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.dinf{flex:1;min-width:0}
.dn{font-size:11px;font-weight:500}
.dr{font-size:9px;color:var(--color-text-secondary)}
.alrt{display:flex;align-items:flex-start;gap:7px;padding:6px 9px;border-radius:var(--border-radius-md);border:.5px solid;margin-bottom:4px;font-size:10px}
.alrt.p{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.alrt.u{background:var(--rdl);border-color:#F7C1C1;color:#791F1F}
.alrt.i{background:var(--acl);border-color:#B5D4F4;color:var(--acd)}
.alrt.w{background:var(--aml);border-color:#FAC775;color:#633806}
.alrt.h{background:#FEF9EE;border-color:#FAC775;color:#633806}
.at{font-weight:500;margin-bottom:1px}
.tl{padding-left:16px;position:relative;display:flex;flex-direction:column}
.tl::before{content:'';position:absolute;left:4px;top:8px;bottom:8px;width:1px;background:var(--color-border-tertiary)}
.tli{position:relative;padding:4px 0 4px 10px}
.tld{position:absolute;left:-12px;top:8px;width:7px;height:7px;border-radius:50%;border:1.5px solid}
.tld.p{border-color:var(--gc);background:var(--gl)}
.tld.s{border-color:var(--ac);background:var(--acl)}
.tld.h{border-color:var(--am);background:var(--aml)}
.tld.u{border-color:var(--rd);background:var(--rdl)}
.tlt{font-size:10px;font-weight:500}
.tls{font-size:9px;color:var(--color-text-secondary)}

/* ── SESSION CLOCK ── */
.sess-bar{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px 13px;display:flex;align-items:center;gap:10px}
.sess-live{width:8px;height:8px;border-radius:50%;background:#3B6D11;flex-shrink:0;animation:blink 1.4s ease-in-out infinite}
.sess-inf{flex:1;min-width:0}
.sess-name{font-size:11px;font-weight:500}
.sess-meta{font-size:9px;color:var(--color-text-secondary)}
.sess-timer{font-size:14px;font-weight:500;color:var(--gc);font-variant-numeric:tabular-nums}
.sess-prog{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-top:5px}
.sess-pfil{height:100%;border-radius:2px;background:var(--gc);transition:width .5s}

/* ── HOL BANNER ── */
.hol-banner{background:#FEF9EE;border:.5px solid #FAC775;border-radius:var(--border-radius-lg);padding:12px 14px;display:flex;align-items:center;gap:12px}
.hol-icon{width:36px;height:36px;border-radius:8px;background:var(--aml);display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>

<h2 class="sr-only">Smart Attendance System — full app with login screen, role-based routing (admin and student portals), holiday system, and live session clock visible in both portals.</h2>

<div class="app" id="app">
</div>

<script>
const S={
  screen:'login',
  role:null,
  adminPage:'adash',
  studentPage:'shome',
  holiday:{active:false,name:''},
  sessions:[
    {id:1,code:'CS301',name:'Data Structures',teacher:'Prof. R. Kumar',room:'Room 101',start:'09:00',end:'10:00',status:'ended',present:38,late:4,absent:0,section:'A'},
    {id:2,code:'CS302',name:'DBMS',teacher:'Prof. S. Gupta',room:'Room 204',start:'10:00',end:'11:30',status:'live',present:30,late:2,absent:6,section:'A'},
    {id:3,code:'CS303',name:'Operating Systems',teacher:'Prof. A. Singh',room:'Room 301',start:'11:30',end:'12:30',status:'upcoming',present:0,late:0,absent:0,section:'A'},
    {id:4,code:'CS304',name:'Comp. Networks',teacher:'Prof. D. Verma',room:'Lab 2',start:'13:00',end:'14:00',status:'upcoming',present:0,late:0,absent:0,section:'A'},
  ],
  holidays:[
    {date:'2026-05-10',name:'Buddha Purnima',type:'National'},
    {date:'2026-06-15',name:'Summer break',type:'Institution'},
    {date:'2026-08-15',name:'Independence Day',type:'National'},
    {date:'2026-10-02',name:'Gandhi Jayanti',type:'National'},
  ],
  clockInterval:null,
  sessionSeconds:2640,
};

function render(){
  const app=document.getElementById('app');
  if(S.screen==='login'){app.innerHTML='';app.appendChild(loginScreen());return;}
  app.innerHTML='';app.appendChild(mainShell());
  if(S.clockInterval)clearInterval(S.clockInterval);
  S.clockInterval=setInterval(tickClock,1000);
}

function loginScreen(){
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;align-items:center;justify-content:center;min-height:700px;background:var(--color-background-tertiary)';
  wrap.innerHTML=`
  <div style="width:360px;display:flex;flex-direction:column;gap:16px">
    <div style="text-align:center;margin-bottom:8px">
      <div style="width:48px;height:48px;border-radius:12px;background:var(--ac);display:flex;align-items:center;justify-content:center;margin:0 auto 10px"><i class="ti ti-scan-eye" style="font-size:22px;color:#fff" aria-hidden="true"></i></div>
      <div style="font-size:18px;font-weight:500">FaceAttend</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">Smart Attendance Recognition System</div>
    </div>

    <div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px 22px">
      <div style="font-size:12px;font-weight:500;margin-bottom:14px">Sign in to your account</div>
      <div class="fg"><label>Login as</label><select id="roleSelect" onchange="updateLoginRole()"><option value="admin">Admin / Teacher</option><option value="student">Student</option></select></div>
      <div class="fg"><label id="uidLabel">Admin ID</label><input class="inp-lg" id="uidInput" placeholder="admin@college.edu" value="admin@college.edu"></div>
      <div class="fg" style="margin-bottom:14px"><label>Password</label><div style="position:relative"><input class="inp-lg" type="password" value="••••••••" style="padding-right:36px"><i class="ti ti-eye" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--color-text-secondary);cursor:pointer" aria-hidden="true"></i></div></div>
      <button class="btn pri" style="width:100%;padding:9px;font-size:13px" id="loginBtn" onclick="doLogin()"><i class="ti ti-login" style="font-size:14px;margin-right:5px" aria-hidden="true"></i>Sign in</button>
      <div style="font-size:10px;color:var(--color-text-secondary);margin-top:10px;text-align:center">Demo: select role and click Sign in</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer" onclick="quickLogin('admin')">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px"><div style="width:24px;height:24px;border-radius:6px;background:var(--acl);display:flex;align-items:center;justify-content:center"><i class="ti ti-shield" style="font-size:13px;color:var(--ac)" aria-hidden="true"></i></div><span style="font-size:11px;font-weight:500">Admin login</span></div>
        <div style="font-size:9px;color:var(--color-text-secondary)">Full dashboard access</div>
      </div>
      <div style="background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer" onclick="quickLogin('student')">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px"><div style="width:24px;height:24px;border-radius:6px;background:var(--gl);display:flex;align-items:center;justify-content:center"><i class="ti ti-user-circle" style="font-size:13px;color:var(--gc)" aria-hidden="true"></i></div><span style="font-size:11px;font-weight:500">Student login</span></div>
        <div style="font-size:9px;color:var(--color-text-secondary)">Priya Sharma · CS2101</div>
      </div>
    </div>
  </div>`;
  return wrap;
}

function updateLoginRole(){
  const r=document.getElementById('roleSelect').value;
  document.getElementById('uidLabel').textContent=r==='admin'?'Admin ID':'Student ID';
  document.getElementById('uidInput').placeholder=r==='admin'?'admin@college.edu':'CS2101';
  document.getElementById('uidInput').value=r==='admin'?'admin@college.edu':'CS2101';
}

function doLogin(){
  const r=document.getElementById('roleSelect').value;
  quickLogin(r);
}

function quickLogin(role){
  S.role=role;S.screen='portal';render();
}

function logout(){
  S.role=null;S.screen='login';
  if(S.clockInterval)clearInterval(S.clockInterval);
  render();
}

function mainShell(){
  const shell=document.createElement('div');
  shell.style.cssText='display:flex;flex-direction:column;min-height:700px';

  const liveSession=S.sessions.find(s=>s.status==='live');
  const isHoliday=S.holiday.active;

  shell.innerHTML=`
  <div class="topbar">
    <div class="logo" style="background:${S.role==='admin'?'var(--ac)':'var(--gc)'}">
      <i class="ti ti-${S.role==='admin'?'scan-eye':'user-circle'}" aria-hidden="true"></i>
    </div>
    <span style="font-size:13px;font-weight:500">FaceAttend — ${S.role==='admin'?'Admin Dashboard':'Student Portal'}</span>
    ${isHoliday?`<span class="phol"><i class="ti ti-calendar-off" style="font-size:12px" aria-hidden="true"></i>Holiday: ${S.holiday.name}</span>`:''}
    ${liveSession&&!isHoliday?`<span class="plive"><span class="pulse"></span>Live: ${liveSession.code} ${liveSession.name}</span>`:''}
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <span style="font-size:10px;color:var(--color-text-secondary)">Fri 9 May 2026</span>
      <div class="dav" style="width:26px;height:26px;background:${S.role==='admin'?'var(--acl)':'var(--gl)'};color:${S.role==='admin'?'var(--ac)':'var(--gc)'};border-radius:50%;font-size:10px">${S.role==='admin'?'AD':'PS'}</div>
      <button class="btn sm" onclick="logout()"><i class="ti ti-logout" aria-hidden="true"></i> Logout</button>
    </div>
  </div>
  <div class="body">
    <nav class="sb" id="sidebar"></nav>
    <div class="main" id="mainContent"></div>
  </div>`;

  setTimeout(()=>{buildSidebar();renderPage();},0);
  return shell;
}

function buildSidebar(){
  const sb=document.getElementById('sidebar');if(!sb)return;
  const isAdmin=S.role==='admin';
  const cur=isAdmin?S.adminPage:S.studentPage;
  const cls=isAdmin?'ona':'ons';
  const navs=isAdmin?[
    {sec:'Monitor'},
    {id:'adash',icon:'ti-layout-dashboard',label:'Dashboard'},
    {id:'alive',icon:'ti-video',label:'Live feed',badge:'LIVE',bg:'g'},
    {id:'asess',icon:'ti-clock-play',label:'Sessions'},
    {sec:'Attendance'},
    {id:'aatt',icon:'ti-calendar-check',label:'Attendance'},
    {id:'ahol',icon:'ti-calendar-off',label:'Holidays',badge:S.holidays.length,bg:'a'},
    {sec:'Management'},
    {id:'asub',icon:'ti-book',label:'Subjects'},
    {id:'astu',icon:'ti-users',label:'Students'},
    {sec:'Analytics'},
    {id:'arpt',icon:'ti-chart-bar',label:'Reports'},
    {id:'aalerts',icon:'ti-alert-triangle',label:'Unknown alerts',badge:'2',bg:'r'},
    {id:'aset',icon:'ti-settings',label:'Settings'},
  ]:[
    {sec:'My portal'},
    {id:'shome',icon:'ti-home',label:'Home'},
    {id:'satt',icon:'ti-calendar-check',label:'My attendance'},
    {id:'ssess',icon:'ti-clock-play',label:'Class sessions'},
    {id:'shol',icon:'ti-calendar-off',label:'Holidays'},
    {id:'ssub',icon:'ti-book',label:'My subjects'},
    {sec:'Account'},
    {id:'snotif',icon:'ti-bell',label:'Notifications'},
    {id:'sprof',icon:'ti-user',label:'My profile'},
  ];
  sb.innerHTML='';
  navs.forEach(n=>{
    if(n.sec){const d=document.createElement('div');d.className='ns';d.textContent=n.sec;sb.appendChild(d);return;}
    const d=document.createElement('div');
    d.className='ni'+(cur===n.id?' on '+cls:'');
    d.onclick=()=>navTo(n.id);
    d.innerHTML=`<i class="ti ${n.icon}" aria-hidden="true"></i>${n.label}${n.badge?`<span class="nbg ${n.bg}">${n.badge}</span>`:''}`;
    sb.appendChild(d);
  });
}

function navTo(id){
  if(S.role==='admin')S.adminPage=id; else S.studentPage=id;
  buildSidebar();renderPage();
  if(id==='alive')setTimeout(startFeeds,80);
}

function tickClock(){
  const el=document.getElementById('sessTimer');
  const pb=document.getElementById('sessProg');
  if(!el)return;
  S.sessionSeconds+=1;
  const tot=90*60,elapsed=S.sessionSeconds;
  const pct=Math.min(100,Math.round(elapsed/tot*100));
  const rem=Math.max(0,tot-elapsed);
  const m=Math.floor(rem/60),s=rem%60;
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} left`;
  if(pb)pb.style.width=pct+'%';
}

function renderPage(){
  const mc=document.getElementById('mainContent');if(!mc)return;
  mc.innerHTML='';
  const id=S.role==='admin'?S.adminPage:S.studentPage;
  const fn=pages[id];
  if(fn){const nodes=fn();(Array.isArray(nodes)?nodes:[nodes]).forEach(n=>mc.appendChild(n));}
}

function c(tag,css,html){const el=document.createElement(tag);if(css)el.style.cssText=css;if(html)el.innerHTML=html;return el;}
function card(title,bodyHtml,titleRight){
  const d=document.createElement('div');d.className='card';
  if(title!==null){
    const ch=document.createElement('div');ch.className='ch';
    ch.innerHTML=`<span class="ct">${title}</span>${titleRight?`<span>${titleRight}</span>`:''}`;
    d.appendChild(ch);
  }
  const cb=document.createElement('div');cb.className='cb';
  if(bodyHtml)cb.innerHTML=bodyHtml;
  d.appendChild(cb);
  return d;
}
function row(...items){const d=c('div','display:flex;gap:10px');items.forEach(i=>d.appendChild(i));return d;}
function col(...items){const d=c('div','flex:1;display:flex;flex-direction:column;gap:10px');items.forEach(i=>d.appendChild(i));return d;}
function colf(f,...items){const d=c('div',`flex:${f};display:flex;flex-direction:column;gap:10px`);items.forEach(i=>d.appendChild(i));return d;}
function mg(html){const d=c('div');d.className='mg';d.innerHTML=html;return d;}
function mc2(label,val,vcls,sub){return `<div class="mc"><div class="ml">${label}</div><div class="mv" style="color:${vcls}">${val}</div><div class="ms">${sub}</div></div>`;}
function pill(t,cl){return `<span class="pill ${cl}">${t}</span>`;}
function brow(lbl,pct,col){return `<div class="br"><span class="bl2">${lbl}</span><div class="bt"><div class="bf" style="width:${pct}%;background:${col}">${pct}%</div></div><span class="bp">${pct}</span></div>`;}
function tli(cl,t,s){return `<div class="tli"><div class="tld ${cl}"></div><div class="tlt">${t}</div><div class="tls">${s}</div></div>`;}
function alrt(cl,t,s){return `<div class="alrt ${cl}"><i class="ti ti-info-circle" style="font-size:13px;flex-shrink:0" aria-hidden="true"></i><div><div class="at">${t}</div>${s}</div></div>`;}

function sessionBars(){
  const live=S.sessions.find(s=>s.status==='live');
  const isHol=S.holiday.active;
  const nodes=[];

  if(isHol){
    const b=c('div');
    b.className='hol-banner';

    <div style="font-size:10px;color:#633806;margin-top:2px">All class sessions are disabled. CCTV attendance tracking is inactive.</div></div>`;

    return nodes;
  }

  if(live){
    const bar=c('div');bar.className='sess-bar';
    const tot=90,elapsed=Math.floor(S.sessionSeconds/60);
    const pct=Math.min(100,Math.round(elapsed/tot*100));

      <div class="sess-prog"><div class="sess-pfil" id="sessProg" style="width:${pct}%"></div></div>

    ${S.role==='admin'?`<button class="btn dng sm" onclick="endSession()"><i class="ti ti-player-stop" aria-hidden="true"></i> End</button>`:''}`;
    nodes.push(bar);
    setTimeout(tickClock,100);
  }
  return nodes;
}

let feedsOn=false;
function startFeeds(){
  if(feedsOn)return;feedsOn=true;
  const names=[['Priya','#3B6D11'],['Rahul','#3B6D11'],['Ankit','#854F0B'],['?','#E24B4A']];
  [1,2,3].forEach(n=>{
    const cv=document.getElementById('cv'+n);if(!cv)return;
    const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
    const count=n===3?1:n+1;
    const faces=[];
    for(let i=0;i<count;i++){
      const nm=names[i]||['?','#E24B4A'];
      faces.push({x:10+i*(W/(count+.5))+Math.random()*8,y:5+Math.random()*8,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.14,w:32,h:38,col:nm[1],lbl:nm[0]});
    }
    (function frame(){
      ctx.fillStyle='#0a0d14';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#141820';ctx.lineWidth=.4;
      for(let x=0;x<W;x+=14){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=14){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      for(const f of faces){
        f.x+=f.vx;f.y+=f.vy;
        if(f.x<3||f.x>W-f.w-3)f.vx*=-1;
        if(f.y<3||f.y>H-f.h-12)f.vy*=-1;
        ctx.strokeStyle=f.col;ctx.lineWidth=1.2;ctx.beginPath();ctx.roundRect(f.x,f.y,f.w,f.h,3);ctx.stroke();
        const tw=ctx.measureText(f.lbl).width+6;
        ctx.fillStyle=f.col;ctx.fillRect(f.x,f.y-11,tw,10);
        ctx.fillStyle='#fff';ctx.font='7px sans-serif';ctx.fillText(f.lbl,f.x+3,f.y-3);
      }
      requestAnimationFrame(frame);
    })();
  });
}
